<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://unpkg.com/lucide@latest"></script>

<style>
    /* Syntax highlighting (interactive editor) */
    .code_keyword { color: #7c3aed; }
    .code_comment { color: #9ca3af; font-style: italic; }
    .code_string { color: #16a34a; }
    .code_number { color: #ea580c; }

    /** link to start the game **/
    .tiny-button-right {
        margin-left: auto;
    }

    .tiny-button {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;

        background-color: #ff0080;
        color: white;
        text-align: center;
        text-decoration: none;
        font-weight: bold;
        font-size: 0.9em;
        border: none;
        border-radius: 4px;
        cursor: pointer;

        font-family: "Source Code Pro", monospace;

        transition: background-color 0.2s ease-in-out, transform 0.1s ease;

    }

    .tiny-button,
    .tiny-button:link,
    .tiny-button:visited {
        color: white;
        text-decoration: none;
    }

    .tiny-button:hover,
    .tiny-button:focus {
        background-color: #d4006b;
        color: white;
        outline: none;
    }

    .tiny-button svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
    }

    .tiny-toolbar {
        width: calc(100%);
        min-height: 48px;
        padding: 4px 12px;
        border-radius: 10px 10px 0 0;
        background: #eef0f2;
        border: 1px solid #e0e0e0;
        border-bottom: none;
        margin-bottom: 0;
        display: flex;
        align-items: center;
    }

    /** container of the game + editor **/
    .tiny-container {
        display: flex;
        width: calc(100%);
        border: 1px solid #e0e0e0;
        border-radius: 0 0 10px 10px;
        overflow: hidden;
        background: #f8f9fa;
    }

    /** game **/
    .tiny-canvas {
        border: none;
        border-right: 1px solid #e0e0e0;
        cursor: none;

        flex: 1 1 auto;
        max-height: 512px;
        max-width: 512px;
    }

    /** code editor **/
    .tiny-textarea:focus {
        outline: none;
    }

    .tiny-textarea {
        flex: 2 1 auto;
        display: block;
        min-height: 512px;
        padding-left: 48px;
        padding-top: 12px;
        padding-bottom: 12px;
        counter-reset: line;
        width: 100%;
        font-family: "Source Code Pro", monospace;
        font-size: 0.88rem;
        line-height: 1.7;
        color: #333;
        background: #f8f9fa;
        resize: none;
    }

    .tiny-textarea div {
        display: block;
        position: relative;
        white-space: pre-wrap;
        min-height: 1em;
    }

    .tiny-textarea div::before {
        color: #c0c0c0;
        content: counter(line);
        counter-increment: line;
        position: absolute;
        right: calc(100% + 16px);
        font-size: 0.8em;
    }

    .no-resize {
        resize:none;
        border: none;
        overflow: hidden;
    }

    /* Editor page: wider layout, push below fixed nav */
    body.tiny-editor-page #content {
        max-width: 90%;
        padding-top: 64px;
    }

    body.tiny-editor-page #header {
        display: none;
    }

    /* Editor toolbar (editor page mode) */
    .tiny-editor-toolbar {
        width: calc(100%);
        min-height: 48px;
        padding: 4px 12px;
        border-radius: 10px 10px 0 0;
        background: #eef0f2;
        border: 1px solid #e0e0e0;
        border-bottom: none;
        margin-bottom: 0;
        display: flex;
        align-items: center;
        gap: 12px;
        font-family: 'Quicksand', sans-serif;
    }

    .tiny-example-name {
        flex: 1;
        color: #555;
        font-size: 0.9em;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .tiny-examples-select {
        padding: 6px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-family: 'Source Code Pro', monospace;
        font-size: 0.85em;
        background: white;
        cursor: pointer;
    }

    .tiny-examples-select:hover {
        border-color: #ff0080;
    }

    /* Share link below editor */
    .tiny-share-link {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        margin-top: 8px;
        padding: 6px 12px;
        color: #555;
        font-size: 0.85em;
        font-family: 'Source Code Pro', monospace;
        text-decoration: none;
        transition: color 0.15s ease;
    }

    .tiny-share-link svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
    }

    .tiny-share-link:hover {
        color: #ff0080;
    }

    /* Status bar: reload progress indicator */
    .tiny-status-bar {
        width: calc(100%);
        height: 1px;
    }

    .tiny-status-bar-progress {
        height: 100%;
        width: 100%;
    }

    .tiny-status-editing {
        background-color: #e89830;
    }

    .tiny-status-loaded {
        background-color: #4caf50;
    }

    /* === Lucide icons for library sections === */
    /* Original passthrough divs hidden; JS moves icons inline into headings */
    .lib-icon {
        display: none;
    }

    /* Icons inside library headings (h2) */
    .sect1 > h2 > svg {
        width: 20px;
        height: 20px;
        margin-right: 8px;
        vertical-align: -3px;
        color: #1e293b;
    }

    /* Icons inside TOC links */
    #toc a > svg {
        width: 14px;
        height: 14px;
        margin-right: 4px;
        vertical-align: -2px;
    }

    /* Library headings (h2) */
    .sect1 > h2 {
        font-family: 'Lilita One', cursive;
        font-weight: 400;
        letter-spacing: 1px;
        color: #1e293b;
    }

    /* Function headings (h3) with blue left border */
    .sect2 > h3 {
        border-left: 4px solid #00e5ff;
        padding-left: 12px;
        font-weight: 600;
        color: #1e293b;
    }

    /* Spacing between function sections */
    .sect1 > .sectionbody > .sect2 {
        margin-top: 2em;
    }

    /* Override Riak theme fonts for consistency with index.html */
    body {
        font-family: 'Quicksand', sans-serif;
    }

    h1, h2, #toctitle, .sidebarblock > .content > .title {
        font-family: 'Lilita One', cursive;
        font-weight: 400;
    }

    h3, h4, h5, h6 {
        font-family: 'Quicksand', sans-serif;
        font-weight: 700;
    }
</style>
